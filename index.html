<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Morse Trainer</title>
    
    <!-- PWA & iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Morse">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
      }
    }
    </script>
    <style>
        body { overscroll-behavior-y: contain; background: #050505; margin: 0; padding: 0; position: fixed; width: 100%; height: 100%; }
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        #root { height: 100%; width: 100%; }
        .game-input { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Settings, Volume2, VolumeX, RotateCcw, Play, BookOpen, Trophy, Smartphone } from 'lucide-react';

        const NODES = [
          { label: 'T', path: [1], x: 140, y: 100, shape: 'rect' },
          { label: 'M', path: [1, 1], x: 80, y: 100, shape: 'rect' },
          { label: 'O', path: [1, 1, 1], x: 20, y: 100, shape: 'rect' },
          { label: 'G', path: [1, 1, 0], x: 80, y: 220, shape: 'circle' },
          { label: 'Q', path: [1, 1, 0, 1], x: 20, y: 220, shape: 'rect' },
          { label: 'Z', path: [1, 1, 0, 0], x: 110, y: 270, shape: 'circle' },
          { label: 'N', path: [1, 0], x: 140, y: 350, shape: 'circle' },
          { label: 'K', path: [1, 0, 1], x: 80, y: 350, shape: 'rect' },
          { label: 'Y', path: [1, 0, 1, 1], x: 20, y: 350, shape: 'rect' },
          { label: 'C', path: [1, 0, 1, 0], x: 80, y: 470, shape: 'circle' },
          { label: 'D', path: [1, 0, 0], x: 140, y: 580, shape: 'circle' },
          { label: 'X', path: [1, 0, 0, 1], x: 80, y: 580, shape: 'rect' },
          { label: 'B', path: [1, 0, 0, 0], x: 140, y: 700, shape: 'circle' },
          { label: 'E', path: [0], x: 260, y: 100, shape: 'circle' },
          { label: 'I', path: [0, 0], x: 320, y: 100, shape: 'circle' },
          { label: 'S', path: [0, 0, 0], x: 380, y: 100, shape: 'circle' },
          { label: 'H', path: [0, 0, 0, 0], x: 440, y: 100, shape: 'circle' },
          { label: 'U', path: [0, 0, 1], x: 320, y: 220, shape: 'rect' },
          { label: 'V', path: [0, 0, 0, 1], x: 380, y: 220, shape: 'rect' },
          { label: 'F', path: [0, 0, 1, 0], x: 350, y: 270, shape: 'circle' },
          { label: 'A', path: [0, 1], x: 260, y: 350, shape: 'rect' },
          { label: 'R', path: [0, 1, 0], x: 320, y: 350, shape: 'circle' },
          { label: 'L', path: [0, 1, 0, 0], x: 380, y: 350, shape: 'circle' },
          { label: 'W', path: [0, 1, 1], x: 260, y: 580, shape: 'rect' },
          { label: 'P', path: [0, 1, 1, 0], x: 320, y: 580, shape: 'circle' },
          { label: 'J', path: [0, 1, 1, 1], x: 260, y: 700, shape: 'rect' },
        ];

        const TRACES = [
          { x1: 200, y1: 50, x2: 200, y2: 100, val: [] },
          { x1: 200, y1: 100, x2: 140, y2: 100, val: [1] },
          { x1: 200, y1: 100, x2: 260, y2: 100, val: [0] },
          { x1: 140, y1: 100, x2: 80, y2: 100, val: [1, 1] },
          { x1: 80, y1: 100, x2: 20, y2: 100, val: [1, 1, 1] },
          { x1: 140, y1: 350, x2: 80, y2: 350, val: [1, 0, 1] },
          { x1: 80, y1: 350, x2: 20, y2: 350, val: [1, 0, 1, 1] },
          { x1: 80, y1: 220, x2: 20, y2: 220, val: [1, 1, 0, 1] },
          { x1: 140, y1: 580, x2: 80, y2: 580, val: [1, 0, 0, 1] },
          { x1: 140, y1: 100, x2: 140, y2: 350, val: [1, 0] },
          { x1: 140, y1: 350, x2: 140, y2: 580, val: [1, 0, 0] },
          { x1: 140, y1: 580, x2: 140, y2: 700, val: [1, 0, 0, 0] },
          { x1: 80, y1: 100, x2: 80, y2: 220, val: [1, 1, 0] },
          { x1: 80, y1: 350, x2: 80, y2: 470, val: [1, 0, 1, 0] },
          { x1: 80, y1: 220, x2: 80, y2: 270, val: [1, 1, 0, 0] },
          { x1: 80, y1: 270, x2: 110, y2: 270, val: [1, 1, 0, 0] },
          { x1: 260, y1: 100, x2: 320, y2: 100, val: [0, 0] },
          { x1: 320, y1: 100, x2: 380, y2: 100, val: [0, 0, 0] },
          { x1: 380, y1: 100, x2: 440, y2: 100, val: [0, 0, 0, 0] },
          { x1: 260, y1: 350, x2: 320, y2: 350, val: [0, 1, 0] },
          { x1: 320, y1: 350, x2: 380, y2: 350, val: [0, 1, 0, 0] },
          { x1: 260, y1: 580, x2: 320, y2: 580, val: [0, 1, 1, 0] },
          { x1: 260, y1: 100, x2: 260, y2: 350, val: [0, 1] },
          { x1: 260, y1: 350, x2: 260, y2: 580, val: [0, 1, 1] },
          { x1: 260, y1: 580, x2: 260, y2: 700, val: [0, 1, 1, 1] },
          { x1: 320, y1: 100, x2: 320, y2: 220, val: [0, 0, 1] },
          { x1: 380, y1: 100, x2: 380, y2: 220, val: [0, 0, 0, 1] },
          { x1: 320, y1: 220, x2: 320, y2: 270, val: [0, 0, 1, 0] },
          { x1: 320, y1: 270, x2: 350, y2: 270, val: [0, 0, 1, 0] },
        ];

        const App = () => {
          const [sequence, setSequence] = useState([]); 
          const [isMuted, setIsMuted] = useState(false);
          const [isHapticEnabled, setIsHapticEnabled] = useState(true);
          const [showSettings, setShowSettings] = useState(false);
          const [isPressing, setIsPressing] = useState(false);
          const [autoClearDelay, setAutoClearDelay] = useState(1000); 
          const [activePage, setActivePage] = useState('trainer'); // 'trainer' | 'game'
          
          // Game State
          const [gameLetter, setGameLetter] = useState(null);
          const [score, setScore] = useState(0);
          const [totalAttempts, setTotalAttempts] = useState(0);
          const [gameStartTime, setGameLetterStartTime] = useState(null);
          const [feedback, setFeedback] = useState(null);

          const audioCtx = useRef(null);
          const oscillator = useRef(null);
          const gainNode = useRef(null);
          const clearTimerRef = useRef(null);
          const pressStartTimeRef = useRef(0);
          const gameInputRef = useRef(null);

          useEffect(() => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx.current = new AudioContext();
            gainNode.current = audioCtx.current.createGain();
            gainNode.current.connect(audioCtx.current.destination);
            gainNode.current.gain.value = 0;
            return () => audioCtx.current?.close();
          }, []);

          const triggerHaptic = useCallback((duration) => {
            if (isHapticEnabled && window.navigator.vibrate) {
              window.navigator.vibrate(duration);
            }
          }, [isHapticEnabled]);

          const playTone = useCallback(() => {
            if (isMuted || !audioCtx.current) return;
            if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
            oscillator.current = audioCtx.current.createOscillator();
            oscillator.current.type = 'sine';
            oscillator.current.frequency.setValueAtTime(700, audioCtx.current.currentTime);
            oscillator.current.connect(gainNode.current);
            gainNode.current.gain.setTargetAtTime(0.1, audioCtx.current.currentTime, 0.01);
            oscillator.current.start();
          }, [isMuted]);

          const stopTone = useCallback(() => {
            if (!oscillator.current) return;
            gainNode.current.gain.setTargetAtTime(0, audioCtx.current.currentTime, 0.01);
            const osc = oscillator.current;
            oscillator.current = null;
            setTimeout(() => {
              osc.stop();
              osc.disconnect();
            }, 50);
          }, []);

          const handlePointerDown = (e) => {
            if (activePage !== 'trainer' || showSettings) return;
            setIsPressing(true);
            pressStartTimeRef.current = performance.now();
            clearTimeout(clearTimerRef.current);
            playTone();
            triggerHaptic(50);
          };

          const handlePointerUp = (e) => {
            if (!isPressing || activePage !== 'trainer') return;
            const duration = performance.now() - pressStartTimeRef.current;
            const type = duration > 200 ? 1 : 0; 
            setSequence(prev => [...prev, type]);
            setIsPressing(false);
            stopTone();

            if (autoClearDelay > 0) {
              clearTimeout(clearTimerRef.current);
              clearTimerRef.current = setTimeout(() => {
                setSequence([]);
              }, autoClearDelay);
            }
          };

          // Game Logic
          const startNextLetter = useCallback(() => {
            const randomNode = NODES[Math.floor(Math.random() * NODES.length)];
            setGameLetter(randomNode);
            setGameLetterStartTime(performance.now());
            setFeedback(null);
            playMorseSequence(randomNode.path);
            if (gameInputRef.current) gameInputRef.current.focus();
          }, [isMuted, isHapticEnabled]);

          const playMorseSequence = async (path) => {
            const dotTime = 100;
            const dashTime = 300;
            const gap = 100;

            for (const type of path) {
              const duration = type === 1 ? dashTime : dotTime;
              if (!isMuted) {
                 if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
                 const osc = audioCtx.current.createOscillator();
                 osc.type = 'sine';
                 osc.frequency.setValueAtTime(700, audioCtx.current.currentTime);
                 const g = audioCtx.current.createGain();
                 g.connect(audioCtx.current.destination);
                 g.gain.setValueAtTime(0.1, audioCtx.current.currentTime);
                 osc.connect(g);
                 osc.start();
                 osc.stop(audioCtx.current.currentTime + duration/1000);
              }
              if (isHapticEnabled && window.navigator.vibrate) {
                window.navigator.vibrate(duration);
              }
              await new Promise(r => setTimeout(r, duration + gap));
            }
          };

          const handleGameInput = (e) => {
            const key = e.target.value.toUpperCase().slice(-1);
            if (!gameLetter || !key.match(/[A-Z]/)) return;

            setTotalAttempts(prev => prev + 1);
            if (key === gameLetter.label) {
              const elapsed = performance.now() - gameStartTime;
              const points = Math.max(10, Math.floor(5000 / (elapsed / 1000)));
              setScore(prev => prev + points);
              setFeedback({ correct: true, letter: key });
              setTimeout(startNextLetter, 1000);
            } else {
              setFeedback({ correct: false, letter: key });
              setTimeout(() => setFeedback(null), 1000);
            }
            e.target.value = '';
          };

          useEffect(() => {
            if (activePage === 'game' && !gameLetter) {
              startNextLetter();
            }
          }, [activePage]);

          const isPathActive = (path) => {
            if (path.length > sequence.length) return false;
            return path.every((val, i) => val === sequence[i]);
          };

          const currentLetterNode = NODES.find(n => JSON.stringify(n.path) === JSON.stringify(sequence));

          return (
            <div 
              onPointerDown={handlePointerDown}
              onPointerUp={handlePointerUp}
              onPointerCancel={handlePointerUp}
              className={`flex flex-col h-full w-full bg-[#050505] text-zinc-100 font-sans overflow-hidden select-none touch-none transition-colors duration-200 ${isPressing ? 'bg-green-500/5' : ''}`}
            >
              {/* Navigation Header */}
              <div className="absolute top-12 left-6 right-6 z-[60] flex justify-between items-center">
                <div className="flex gap-2 bg-zinc-900/80 backdrop-blur-md p-1 rounded-2xl border border-white/5">
                  <button 
                    onClick={() => setActivePage('trainer')}
                    className={`px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 ${activePage === 'trainer' ? 'bg-green-500 text-black' : 'text-zinc-400'}`}
                  >
                    <BookOpen size={14} /> Trainer
                  </button>
                  <button 
                    onClick={() => setActivePage('game')}
                    className={`px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 ${activePage === 'game' ? 'bg-green-500 text-black' : 'text-zinc-400'}`}
                  >
                    <Trophy size={14} /> Game
                  </button>
                </div>
                <button 
                  onClick={() => setShowSettings(!showSettings)} 
                  className="p-3 bg-zinc-900/80 backdrop-blur-md rounded-2xl border border-white/5 text-zinc-400 hover:text-white transition-colors"
                >
                  <Settings size={20} />
                </button>
              </div>

              <main className="flex-1 relative flex flex-col items-center justify-center p-4">
                {showSettings && (
                  <div className="absolute inset-0 z-[70] bg-black/95 backdrop-blur-xl p-8 flex flex-col animate-in fade-in duration-200">
                    <div className="flex justify-between items-center mb-12 pt-12">
                      <h2 className="text-2xl font-bold">Options</h2>
                      <button onClick={() => setShowSettings(false)} className="px-5 py-2 bg-zinc-800 rounded-full text-sm font-bold">Close</button>
                    </div>
                    <div className="space-y-6">
                      <div className="flex justify-between items-center p-5 bg-zinc-900/50 rounded-3xl border border-white/5">
                        <div className="flex flex-col gap-1">
                           <span className="font-medium text-sm">Auto-Clear Delay</span>
                           <span className="text-xs text-zinc-500">Wait time before reset</span>
                        </div>
                        <div className="flex gap-1 bg-zinc-800/80 p-1.5 rounded-2xl">
                          {[0, 1000, 2000].map(time => (
                            <button 
                              key={time}
                              onClick={() => setAutoClearDelay(time)}
                              className={`px-3 py-1.5 rounded-xl text-xs font-bold transition-all ${autoClearDelay === time ? 'bg-green-500 text-black shadow-md' : 'text-zinc-400 hover:text-white'}`}
                            >
                              {time === 0 ? 'Off' : `${time/1000}s`}
                            </button>
                          ))}
                        </div>
                      </div>

                      <div className="flex justify-between items-center p-5 bg-zinc-900/50 rounded-3xl border border-white/5">
                        <div className="flex items-center gap-3">
                           {isMuted ? <VolumeX className="text-zinc-500" /> : <Volume2 className="text-green-400" />}
                           <span className="font-medium">Sound</span>
                        </div>
                        <button onClick={() => setIsMuted(!isMuted)} className={`w-14 h-8 rounded-full relative transition-colors ${isMuted ? 'bg-zinc-700' : 'bg-green-600'}`}>
                          <div className={`absolute top-1 w-6 h-6 bg-white rounded-full transition-all shadow-md ${isMuted ? 'left-1' : 'left-7'}`} />
                        </button>
                      </div>

                      <div className="flex justify-between items-center p-5 bg-zinc-900/50 rounded-3xl border border-white/5">
                        <div className="flex items-center gap-3">
                           <Smartphone className={isHapticEnabled ? "text-green-400" : "text-zinc-500"} />
                           <span className="font-medium">Haptics (iOS PWA)</span>
                        </div>
                        <button onClick={() => setIsHapticEnabled(!isHapticEnabled)} className={`w-14 h-8 rounded-full relative transition-colors ${!isHapticEnabled ? 'bg-zinc-700' : 'bg-green-600'}`}>
                          <div className={`absolute top-1 w-6 h-6 bg-white rounded-full transition-all shadow-md ${!isHapticEnabled ? 'left-1' : 'left-7'}`} />
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {activePage === 'trainer' ? (
                  <div className="w-full h-full max-w-lg relative pointer-events-none mt-16">
                    <svg viewBox="0 0 460 800" className="w-full h-full">
                      {TRACES.map((t, i) => (
                        <line key={i} x1={t.x1} y1={t.y1} x2={t.x2} y2={t.y2} 
                          className={`stroke-2 transition-colors duration-300 ${isPathActive(t.val) ? 'stroke-green-400/80' : 'stroke-zinc-800'}`} 
                        />
                      ))}
                      {NODES.map((n, i) => {
                        const active = isPathActive(n.path);
                        const exact = JSON.stringify(n.path) === JSON.stringify(sequence);
                        return (
                          <g key={i}>
                            {n.shape === 'circle' ? (
                              <circle cx={n.x} cy={n.y} r={active ? 12 : 10} 
                                className={`transition-all duration-300 ${exact ? 'fill-green-400' : active ? 'fill-green-900/60' : 'fill-[#1a1a1a]'}`}
                                stroke={active ? '#4ade80' : '#222'} strokeWidth="2"
                              />
                            ) : (
                              <rect x={n.x - 18} y={n.y - 10} width={36} height={20} rx="5"
                                className={`transition-all duration-300 ${exact ? 'fill-green-400' : active ? 'fill-green-900/60' : 'fill-[#1a1a1a]'}`}
                                stroke={active ? '#4ade80' : '#222'} strokeWidth="2"
                              />
                            )}
                            <text x={n.x} y={n.y - (n.shape === 'rect' ? 20 : 22)} textAnchor="middle" 
                              className={`text-[16px] font-black select-none pointer-events-none transition-all ${exact ? 'fill-green-400 scale-125' : 'fill-zinc-600'}`}>
                              {n.label}
                            </text>
                          </g>
                        );
                      })}
                    </svg>
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center pointer-events-none">
                      <div className={`text-[12rem] font-black transition-all duration-200 ${currentLetterNode ? 'text-green-500 opacity-100 scale-110 drop-shadow-[0_0_35px_rgba(34,197,94,0.4)]' : 'text-zinc-900 opacity-5'}`}>
                        {currentLetterNode?.label || '?'}
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="w-full h-full flex flex-col items-center justify-center p-8 text-center" onClick={() => gameInputRef.current?.focus()}>
                    <input 
                      ref={gameInputRef}
                      type="text" 
                      className="game-input"
                      onChange={handleGameInput}
                      autoFocus
                    />
                    
                    <div className="mb-12">
                      <div className="text-zinc-500 uppercase tracking-widest text-xs mb-2">Score</div>
                      <div className="text-6xl font-black text-green-500 drop-shadow-[0_0_15px_#22c55e44]">{score}</div>
                      <div className="text-zinc-600 text-sm mt-2">{totalAttempts > 0 ? Math.round((score/(totalAttempts*100))*100) : 0}% Accuracy</div>
                    </div>

                    <div className="relative w-48 h-48 flex items-center justify-center">
                       {feedback ? (
                         <div className={`text-9xl font-black animate-in zoom-in duration-200 ${feedback.correct ? 'text-green-400' : 'text-red-500'}`}>
                            {feedback.letter}
                         </div>
                       ) : (
                         <button 
                           onClick={(e) => { e.stopPropagation(); playMorseSequence(gameLetter.path); }}
                           className="w-32 h-32 rounded-full bg-zinc-900 border-2 border-zinc-800 flex items-center justify-center text-green-500 active:scale-95 transition-all shadow-xl"
                         >
                            <Volume2 size={48} />
                         </button>
                       )}
                    </div>

                    <div className="mt-12 text-zinc-500 text-sm font-medium animate-pulse">
                      {feedback ? (feedback.correct ? 'Great!' : 'Try again...') : 'Listen and type the letter'}
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
