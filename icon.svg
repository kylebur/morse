<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#121212;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#grad)" />
  
  <!-- PCB Traces Style -->
  <path d="M100 100 L150 100 L150 200" stroke="#1a1a1a" stroke-width="4" fill="none" />
  <path d="M412 412 L362 412 L362 312" stroke="#1a1a1a" stroke-width="4" fill="none" />
  
  <!-- Morse Elements -->
  <g filter="url(#glow)">
    <!-- DOT -->
    <circle cx="180" cy="256" r="40" fill="#4ade80" />
    <!-- DASH -->
    <rect x="260" y="216" width="120" height="80" rx="20" fill="#4ade80" />
  </g>
  
  <!-- Subtle Border -->
  <rect x="10" y="10" width="492" height="492" rx="115" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2" />
</svg>
